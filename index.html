<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- interactive-widget: Android Chrome resizes the page when the keyboard
       opens (the radar shrinks instead of being covered); iOS is handled via
       the visualViewport listener in game.js -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
  <title>Galexical – Daily semantic word hunt</title>
  <meta name="description" content="Galexical — a daily word riddle in a galaxy of meaning. Guess the secret word: the closer you get, the closer it orbits the sun." />
  <meta property="og:title" content="Galexical" />
  <meta property="og:description" content="A daily word riddle in a galaxy of meaning. EN / FR." />
  <meta property="og:url" content="https://galexical.com" />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- Three.js canvas fills 100vw/100vh -->
  <div id="three-canvas-container" aria-hidden="true"></div>
  <!-- CSS2DRenderer labels overlay (pointer-events:none) -->
  <div id="css2d-container" aria-hidden="true"></div>

  <!-- Top bar: logo + controls -->
  <header id="top-bar">
    <div id="top-bar-left">
      <h1>Galexical</h1>
      <div class="pill" id="puzzle-pill" aria-live="polite">Loading…</div>
    </div>
    <div id="top-bar-right">
      <span class="best-rank-badge" id="best-rank-label" aria-live="polite"></span>
      <button class="how-to-btn" id="how-to-btn" aria-label="How to play">?</button>
      <button class="how-to-btn" id="stats-btn" aria-label="Statistics">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="currentColor" aria-hidden="true">
          <rect x="1"    y="8" width="3" height="5"  rx="1"/>
          <rect x="5.5"  y="4" width="3" height="9"  rx="1"/>
          <rect x="10"   y="1" width="3" height="12" rx="1"/>
        </svg>
      </button>
      <div class="lang-switcher" role="group" aria-label="Language">
        <button class="lang-btn active" id="lang-en" data-lang="en" aria-pressed="true">EN</button>
        <button class="lang-btn" id="lang-fr" data-lang="fr" aria-pressed="false">FR</button>
      </div>
    </div>
  </header>

  <!-- Bottom tabs (languettes derrière l'input bar) : Wordle à gauche, Suggestions à droite -->
  <button id="wordle-handle" aria-label="Open Wordle challenge">
    <span id="wordle-handle-label">Wordle</span>
  </button>
  <button id="suggest-handle" aria-label="Open suggestions">
    <span id="suggest-handle-label">Suggestions</span>
  </button>

  <!-- Suggestions panel (compact popup above the input bar) -->
  <div id="suggest-panel" role="dialog" aria-modal="false" aria-label="Suggestions">
    <div id="suggest-panel-header">
      <span id="suggest-panel-title">Suggestions</span>
      <button id="suggest-close" aria-label="Close suggestions">✕</button>
    </div>
    <p id="suggest-hint"></p>
    <div id="suggest-words" aria-live="polite"></div>
  </div>

  <!-- Input bar (fixed bottom) -->
  <div id="input-bar">
    <input
      type="text"
      id="semantic-input"
      placeholder="Type a word…"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="none"
      spellcheck="false"
      aria-label="Semantic guess input"
    />
    <button id="semantic-submit" aria-label="Submit semantic guess">Guess</button>
    <div id="semantic-message" class="game-message" role="alert" aria-live="polite"></div>
  </div>

  <!-- Wordle overlay (slides up from bottom, partial bottom sheet) -->
  <div id="wordle-overlay" role="dialog" aria-modal="true" aria-label="Wordle challenge">
    <div id="wordle-drag-handle" aria-hidden="true"><span></span></div>
    <div id="wordle-overlay-header">
      <span id="wordle-overlay-title">Wordle</span>
      <button id="wordle-overlay-close" aria-label="Close Wordle">✕</button>
    </div>
    <div id="wordle-overlay-body">
      <div id="wordle-inline-content"></div>
      <div id="partial-clues" class="partial-clues" aria-live="polite" aria-label="Partial clues from failed Wordle attempts"></div>
    </div>
  </div>

  <!-- Left panel: guess history (share section must stay BEFORE guess list) -->
  <aside id="guess-panel" aria-label="Guess history">
    <button id="guess-panel-handle" aria-label="Toggle guess list" aria-expanded="true">
      <span id="guess-panel-handle-label">Journey</span>
    </button>
    <div id="guess-panel-header">
      <span class="caption" id="journey-title">Your journey</span>
      <span class="caption" id="journey-count" aria-live="polite"></span>
    </div>
    <!-- Pinned in the header zone: always visible while the list below scrolls -->
    <div id="last-guess-section" class="hidden">
      <div class="caption" id="last-guess-title">Last guess</div>
      <div id="last-guess-container"></div>
    </div>
    <!-- Share card (post-win) sits above the ranked title, also in the fixed zone -->
    <section class="share-section" id="share-section" aria-label="Share your result" style="display:none">
      <div class="caption" id="share-caption">Share your result</div>
      <div class="share-card" id="share-card-preview" aria-live="polite"></div>
      <button class="copy-btn" id="copy-share-btn" aria-label="Copy result to clipboard">📋 Copy to clipboard</button>
      <div id="copy-confirm" class="copy-confirm" role="alert" aria-live="polite"></div>
    </section>
    <div class="caption" id="ranked-title">Ranked guesses</div>
    <div id="guess-panel-body">
      <div class="guess-list" id="guess-list" role="list" aria-label="Semantic guess history">
        <div class="guess-list-empty" id="guess-empty-state">
          <p>Your guesses will appear here.</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Win modal -->
  <div id="win-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="You solved today's Galexical!">
    <div class="modal-backdrop" id="win-modal-backdrop"></div>
    <div class="modal-content win-modal-content" role="document">
      <div class="win-header">
        <div class="win-icon" aria-hidden="true">🎯</div>
        <h2>You solved it!</h2>
        <p class="win-subtitle" id="win-subtitle"></p>
      </div>
      <div class="share-card win-share-card" id="win-share-card" aria-live="polite"></div>
      <button class="copy-btn" id="win-copy-btn" aria-label="Copy result to clipboard">📋 Copy to clipboard</button>
      <div id="win-copy-confirm" class="copy-confirm" role="alert" aria-live="polite"></div>
      <button class="close-win-btn" id="close-win-btn" aria-label="Close win screen and continue">Keep playing</button>
    </div>
  </div>

  <!-- Star collection modal (sun skins) -->
  <div id="stars-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Star collection">
    <div class="modal-backdrop" id="stars-backdrop"></div>
    <div class="modal-content" role="document">
      <button class="modal-close" id="stars-close" aria-label="Close">✕</button>
      <div id="stars-content"></div>
    </div>
  </div>

  <!-- Stats modal -->
  <div id="stats-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Statistics">
    <div class="modal-backdrop" id="stats-backdrop"></div>
    <div class="modal-content" role="document">
      <button class="modal-close" id="stats-close" aria-label="Close">✕</button>
      <div id="stats-content"></div>
    </div>
  </div>

  <!-- How to play modal -->
  <div id="how-to-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="how-to-title">
    <div class="modal-backdrop" id="how-to-backdrop"></div>
    <div class="modal-content" role="document">
      <button class="modal-close" id="how-to-close" aria-label="Close">✕</button>
      <div id="how-to-content"></div>
    </div>
  </div>

  <script type="module" src="game.js"></script>
</body>
</html>
