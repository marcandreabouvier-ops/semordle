name: Generate weekly puzzles

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache word2vec models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: models
          key: semordle-w2v-models-v1

      - name: Download word2vec models (cache miss only)
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p models
          curl -sL -o models/frWac_500_skip_cut100.bin \
            "https://embeddings.net/embeddings/frWac_no_postag_no_phrase_500_skip_cut100.bin"
          curl -sL -o models/GoogleNews-slim.bin.gz \
            "https://github.com/eyaler/word2vec-slim/raw/master/GoogleNews-vectors-negative300-SLIM.bin.gz"
          gunzip -f models/GoogleNews-slim.bin.gz

      - name: Install dependencies
        run: pip install numpy --quiet

      - name: Generate next 10 days of puzzles
        run: |
          python generate_puzzle.py --schedule schedule.csv --days-ahead 10

      - name: Commit and push new puzzle files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No new puzzles to commit" || \
            git commit -m "chore: add puzzles for the next 10 days [skip ci]" && git push
