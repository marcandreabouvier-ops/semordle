name: Generate weekly puzzles

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies & model
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/huggingface
          key: semordle-ml-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            semordle-ml-${{ runner.os }}-

      - name: Install dependencies
        run: pip install sentence-transformers torch --quiet

      - name: Generate next 10 days of puzzles
        run: |
          python generate_puzzle.py --schedule schedule.csv --days-ahead 10

      - name: Commit and push new puzzle files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No new puzzles to commit" || \
            git commit -m "chore: add puzzles for the next 10 days [skip ci]" && git push
